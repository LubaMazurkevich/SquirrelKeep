<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Списки</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/" class="brand-link">SquirrelKeep</a>
            <div class="auth-controls">
                <span class="squirrel-avatar" aria-hidden="true">
                    <img src="{% static 'lists/squirrel.jpeg' %}" alt="" class="squirrel-avatar-image" width="220" height="144">
                </span>
                {% if user.is_authenticated %}
                <form method="post" action="{% url 'account_logout' %}" class="auth-logout-form">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-success auth-btn">Выход</button>
                </form>
                {% else %}
                <a href="{% url 'account_login' %}" class="btn btn-primary auth-btn">Вход</a>
                {% endif %}
            </div>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
